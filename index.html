<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catur Anjing Knight</title>
    <style>
        body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        /* Papan Catur Sederhana */
        .board { 
            display: grid; 
            grid-template-columns: repeat(5, 60px); 
            grid-template-rows: repeat(5, 60px); 
            border: 4px solid #555; 
        }
        .cell { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 30px; }
        .white { background: #eee; }
        .black { background: #888; }
        
        /* Gaya karakter */
        .knight { color: blue; font-weight: bold; }
        .dog { filter: grayscale(1); }
        .pawn { color: red; }
    </style>
</head>
<body>

    <div class="board">
        <div class="cell white"></div><div class="cell black"></div><div class="cell white"></div><div class="cell black"></div><div class="cell white"></div>
        <div class="cell black"></div><div class="cell white">🐕</div><div class="cell black">♟️</div><div class="cell white">🐕</div><div class="cell black"></div>
        <div class="cell white"></div><div class="cell black">🐕</div><div class="cell white">🐕</div><div class="cell black">🐕</div><div class="cell white"></div>
        <div class="cell black"></div><div class="cell white">♙</div><div class="cell black">♙</div><div class="cell white">♙</div><div class="cell black"></div>
        <div class="cell white"></div><div class="cell black"></div><div class="cell white" style="background: yellow;">♞</div><div class="cell black"></div><div class="cell white"></div>
    </div>

</body>
</html>
