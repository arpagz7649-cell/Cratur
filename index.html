<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Game & Hosting</title>
    <style>
        body { background: #0b0b0b; color: white; font-family: sans-serif; margin: 0; text-align: center; }
        .container { padding: 20px; }
        #game-canvas { 
            width: 90%; height: 250px; background: #1a1a1a; 
            margin: 20px auto; border: 2px solid #00ccff; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center;
        }
        .btn { background: #ff8b00; border: none; padding: 12px 25px; color: white; border-radius: 8px; font-weight: bold; margin: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Project Multiplayer</h1>
        <div id="game-canvas">
            <p>Area Game 3D (Java Engine)</p>
        </div>
        <button class="btn">Mainkan</button>
        <button class="btn" style="background:#00ccff">Mulai Hosting</button>
    </div>
</body>
</html>
